server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: online-chat
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_chat?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: cn.edu.ncu.onlinechat.module
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

jwt:
  secret: please-replace-this-with-a-long-random-secret-at-least-32-bytes
  expiration: 7200000
  header: Authorization
  prefix: "Bearer "

aliyun:
  dypnsapi:
    endpoint: dypnsapi.aliyuncs.com
    access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:replaceme}
    access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:replaceme}
    scheme-name: ${ALIYUN_SMS_SCHEME_NAME:replaceme}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:replaceme}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:replaceme}
    country-code: 86
    code-length: 6
    valid-time: 300
    interval: 60
    return-verify-code: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    cn.edu.ncu.onlinechat: debug
    org.springframework.security: info
