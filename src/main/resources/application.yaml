server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: online-chat
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_chat?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:replaceme}
    password: ${SMTP_PASSWORD:replaceme}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: cn.edu.ncu.onlinechat.module
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

jwt:
  secret: please-replace-this-with-a-long-random-secret-at-least-32-bytes
  expiration: 7200000
  header: Authorization
  prefix: "Bearer "

mail:
  verify:
    from: ${SMTP_FROM:}
    code-length: 6
    valid-time: 300
    interval: 60
    ip-interval: 60
    max-fail-times: 5
    lock-time: 600

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

logging:
  level:
    cn.edu.ncu.onlinechat: debug
    org.springframework.security: info
